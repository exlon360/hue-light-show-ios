name: Build Hue Light Show IPA

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "hue-light-show-v*"
    paths:
      - ".github/workflows/build-hue-light-show-ipa.yml"
      - "HueLightShow/**"
      - "HueLightShow.xcodeproj/**"
      - "scripts/build_hue_light_show_unsigned_ipa.sh"

permissions:
  contents: read

jobs:
  unsigned-ipa:
    name: Build unsigned Hue Light Show IPA
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build unsigned IPA
        run: bash scripts/build_hue_light_show_unsigned_ipa.sh

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: HueLightShow-unsigned-ipa
          path: build/hue-light-show-unsigned-ipa/HueLightShow-unsigned.ipa
          if-no-files-found: error

      - name: Publish IPA to GitHub Release
        if: startsWith(github.ref, 'refs/tags/hue-light-show-v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/hue-light-show-unsigned-ipa/HueLightShow-unsigned.ipa
          generate_release_notes: true
