name: Hue Light Show iOS CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hue-light-show-ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Hue Light Show
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List schemes
        run: xcodebuild -list -project HueLightShow.xcodeproj

      - name: Build for iOS simulator
        shell: bash
        run: |
          set -o pipefail
          mkdir -p build/hue-light-show-ci
          set +e
          xcodebuild \
            -project HueLightShow.xcodeproj \
            -scheme HueLightShow \
            -configuration Debug \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee build/hue-light-show-ci/xcodebuild.log
          status=${PIPESTATUS[0]}
          set -e

          if [[ "${status}" -ne 0 ]]; then
            echo "::group::xcodebuild diagnostics"
            grep -Ei "error:|fatal error:|BUILD FAILED|Check dependencies" build/hue-light-show-ci/xcodebuild.log | tail -80 || true
            echo "::endgroup::"

            while IFS= read -r line; do
              escaped="${line//'%'/'%25'}"
              escaped="${escaped//$'\r'/'%0D'}"
              escaped="${escaped//$'\n'/'%0A'}"
              echo "::error title=Xcode build::${escaped}"
            done < <(grep -Ei "error:|fatal error:|BUILD FAILED|Check dependencies" build/hue-light-show-ci/xcodebuild.log | tail -20 || true)

            exit "${status}"
          fi
